<div class="login-container">

  <!-- LADO IZQUIERDO -->
  <div class="login-left">
    <div class="overlay">
      <h1 class="logo">Willatec</h1>

      <h2>Bienvenido de vuelta</h2>
      <p>Inicia sesión para continuar gestionando tu empresa.</p>
    </div>
  </div>

  <!-- LADO DERECHO -->
  <div class="login-right">

    <div class="card">

      <h2>Iniciar Sesión</h2>
      <p class="subtitle">Ingresa tus credenciales</p>

      <!-- ERROR -->
      <div *ngIf="error" class="error-box">
        {{ error }}
      </div>

      <!-- FORM -->
      <form (ngSubmit)="login()">

        <label>Correo electrónico</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="correo@empresa.com"
          required
        />

        <label>Contraseña</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />

        <button type="submit">
          Iniciar Sesión
        </button>

      </form>

    </div>

  </div>

</div>
