<div class="productos-container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>Productos</h1>
      <p>Gestiona el catálogo de productos</p>
    </div>

    <button class="btn-primary">
      + Nuevo
    </button>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- BUSCADOR -->
    <input 
      type="text" 
      placeholder="Buscar productos..." 
      class="search"
    />

    <!-- TABLA -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Compra</th>
            <th>Venta</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let p of productos">
            <td class="codigo">{{ p.codigo }}</td>
            <td>{{ p.nombre }}</td>
            <td>{{ p.categoria }}</td>
            <td>S/ {{ p.precioCompra }}</td>
            <td>S/ {{ p.precioVenta }}</td>
            <td>{{ p.stock }}</td>

            <td>
              <span class="badge activo" *ngIf="p.estado === 'activo'">
                Activo
              </span>
              <span class="badge inactivo" *ngIf="p.estado === 'inactivo'">
                Inactivo
              </span>
            </td>

            <td class="acciones">
              <button class="btn-edit">Editar</button>
              <button class="btn-delete">Eliminar</button>
            </td>
          </tr>
        </tbody>

      </table>
    </div>

  </div>

</div>
